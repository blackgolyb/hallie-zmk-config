manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: splittedspace
      url-base: https://github.com/SplittedSpace

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-firmware--new
      remote: splittedspace
      revision: main

  self:
    path: config
